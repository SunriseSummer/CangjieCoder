[package]
name = "cangjiecoderagent"
version = "0.1.0"
cjc-version = "1.0.5"
output-type = "executable"
description = "Single-agent Cangjie development app that orchestrates the local CangjieCoder service over stdio MCP."

[target.x86_64-unknown-linux-gnu]
  [target.x86_64-unknown-linux-gnu.bin-dependencies]
    path-option = ["${STDX_PATH}"]

[target.aarch64-unknown-linux-gnu]
  [target.aarch64-unknown-linux-gnu.bin-dependencies]
    path-option = ["${STDX_PATH}"]

[target.x86_64-apple-darwin]
  [target.x86_64-apple-darwin.bin-dependencies]
    path-option = ["${STDX_PATH}"]

[target.aarch64-apple-darwin]
  [target.aarch64-apple-darwin.bin-dependencies]
    path-option = ["${STDX_PATH}"]

[target.x86_64-w64-mingw32]
  [target.x86_64-w64-mingw32.bin-dependencies]
    path-option = ["${STDX_PATH}"]
